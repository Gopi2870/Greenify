<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>TrashSnap — Map</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.3/dist/leaflet.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">TrashSnap</div>
    <nav class="nav">
      <a href="index.html">Home</a>
      <a href="map.html" class="active">Map</a>
      <a href="wallet.html">Wallet</a>
    </nav>
  </header>

  <main class="container">
    <section class="card">
      <h2>Map View</h2>
      <p class="muted">Reports and dumpyards near you</p>
      <div id="map" style="height:420px;border-radius:12px;overflow:hidden;margin-top:12px"></div>
      <div class="legend">
        <span class="pill orange">Pending</span>
        <span class="pill green">Cleared</span>
        <span class="pill purple">Dumpyards</span>
        <span class="pill blue">Your location</span>
      </div>
    </section>
  </main>

  <footer class="bottomnav">
    <a href="index.html">Home</a>
    <a href="map.html" class="active">Map</a>
    <a href="#" id="snapBottomMap">📸</a>
    <a href="#">History</a>
    <a href="wallet.html">Wallet</a>
  </footer>

  <script src="https://unpkg.com/leaflet@1.9.3/dist/leaflet.js"></script>
  <script src="app.js"></script>
  <script>
    // map specific init (uses state from app.js)
    document.addEventListener('DOMContentLoaded',()=>{
      const map = L.map('map').setView([17.4239,78.4732], 12); // example center
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {maxZoom: 19}).addTo(map);

      // draw reports
      (window.appState.reports||[]).forEach(r=>{
        if(!r.coords) return;
        const color = r.status==='cleaned'? 'green' : (r.status==='pending'? 'orange':'#666');
        const marker = L.circleMarker([r.coords.lat, r.coords.lng], {radius:10, color}).addTo(map);
        marker.bindPopup(`<strong>${r.reporterName}</strong><div>${r.status}</div><div><a href='${r.image}' target='_blank'>Photo</a></div>`);
      });

      // dump yards
      (window.appState.dumpYards||[]).forEach(d=>{
        const m = L.marker([d.lat,d.lng]).addTo(map);
        m.bindPopup(`<strong>Dumpyard</strong><div>${d.name}</div>`);
      });

      // try to show user's location
      if(navigator.geolocation){ navigator.geolocation.getCurrentPosition(pos=>{ L.circle([pos.coords.latitude,pos.coords.longitude],{radius:50}).addTo(map).bindPopup('You are here'); map.setView([pos.coords.latitude,pos.coords.longitude],13); }); }
    });
  </script>
</body>
</html>
